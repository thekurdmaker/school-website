<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کۆمەلگەی شەهید فەخیر مەرگەسۆری</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#eef2f7;color:#333;scroll-behavior:smooth;}

/* animations */
@keyframes fadeSlideUp {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes gentlePulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}
@keyframes slideInLeft {
  0% { opacity: 0; transform: translateX(-40px); }
  100% { opacity: 1; transform: translateX(0); }
}
@keyframes slideInRight {
  0% { opacity: 0; transform: translateX(40px); }
  100% { opacity: 1; transform: translateX(0); }
}

nav, header, section, footer {
  animation: fadeSlideUp 0.7s ease forwards;
}

nav{
  background:#2575fc;
  padding:15px 30px;
  display:flex;
  justify-content:center;
  gap:20px;
  position:sticky;
  top:0;
  z-index:1000;
  flex-wrap: wrap;
}
nav a{
  text-decoration:none;
  color:white;
  font-weight:600;
  transition:0.3s;
}
nav a:hover{
  transform:translateY(-3px);
}

/* FIXED HEADER */
header{
  text-align:center;
  padding:60px 20px;
  background:linear-gradient(135deg,#4a148c,#1976d2);
  color:white;
  position:relative;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* FIXED IMAGE CENTER */
header img{
  width:160px;
  height:160px;
  border-radius:50%;
  border:4px solid white;
  object-fit:cover;
  margin:0 auto 15px;
  display:block;
  transition:0.4s;
}
header img:hover{
  transform:rotate(8deg) scale(1.08);
}

.lang-switch{
  position:absolute;
  top:15px;
  left:20px;
  background:white;
  color:#2575fc;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

section{
  padding:70px 20px;
  max-width:1200px;
  margin:auto;
}
section h2{
  text-align:center;
  margin-bottom:30px;
  font-size:2.5em;
  color:#1976d2;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}
.card{
  background:white;
  padding:22px;
  border-radius:14px;
  box-shadow:0 6px 12px rgba(0,0,0,0.1);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-10px);
}

footer{
  background:#1976d2;
  color:white;
  text-align:center;
  padding:20px;
}

/* music */
.music-container{
  position:fixed;
  bottom:20px;
  left:20px;
  background:white;
  border-radius:16px;
  padding:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  z-index:999;
  width:320px;
}
.music-title{
  text-align:center;
  color:#1976d2;
  font-weight:bold;
}
.music-iframe{
  width:100%;
  height:60px;
}
</style>
</head>

<body lang="ku" dir="rtl">

<select class="lang-switch" onchange="changeLanguage(this.value)">
<option value="ku">کوردی</option>
<option value="ar">العربية</option>
<option value="en">English</option>
</select>

<nav>
<a href="#home">سەرەتا</a>
<a href="#about">دەربارە</a>
<a href="#info">زانیاری</a>
<a href="#contact">پەیوەندی</a>
</nav>

<header id="home">

<!-- ✅ FIXED IMAGE -->
<img src="https://tse2.mm.bing.net/th/id/OIP.h4b_qly2cFQquu-TxmI0UgHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"
alt="لۆگۆ">

<h1>کۆمەلگەی شەهید فەخیر مەرگەسۆری</h1>
<p>بەخێربێن بۆ ماڵپەڕی فەرمی</p>

</header>

<section id="about">
<h2>دەربارە</h2>
<div class="grid">
<div class="card">خوێندنی باش و پێشکەوتوو</div>
<div class="card">مامۆستای شارەزا</div>
<div class="card">ژینگەی باش</div>
</div>
</section>

<section id="info">
<h2>زانیاری</h2>
<div class="grid">
<div class="card">١٢٠٠ قوتابی</div>
<div class="card">١٦٠ مامۆستا</div>
</div>
</section>

<section id="contact">
<h2>پەیوەندی</h2>
<div class="grid">
<div class="card">07514309063</div>
<div class="card">Erbil</div>
</div>
</section>

<!-- music -->
<div class="music-container">
  <div class="music-title">🎵 هەر کوردین</div>
  <iframe src="https://archive.org/embed/har-kurdin-w-har-kurd-abin" class="music-iframe"></iframe>
</div>

<script>
function changeLanguage(lang){
  document.body.dir = (lang=='en')?'ltr':'rtl';
}
</script>

<footer>
<p>© 2026 School</p>
</footer>

</body>
</html>
